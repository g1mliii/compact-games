name: Deploy Website

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - website/**
      - .github/workflows/deploy-website.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Minify assets
        run: |
          curl -sL https://github.com/tdewolff/minify/releases/latest/download/minify_linux_amd64.tar.gz | tar xz -C /tmp
          /tmp/minify website/index.html -o website/index.html
          /tmp/minify website/privacy.html -o website/privacy.html
          /tmp/minify website/tos.html -o website/tos.html
          /tmp/minify website/styles.css -o website/styles.css
          /tmp/minify website/app.js -o website/app.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
