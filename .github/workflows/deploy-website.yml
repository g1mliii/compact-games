name: Deploy Website

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - compact-games-site-package/website/**
      - .github/workflows/deploy-website.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Minify assets
        run: |
          MINIFY_VERSION=v2.24.12
          MINIFY_ARCHIVE=minify_linux_amd64.tar.gz
          curl -fsSL -o /tmp/$MINIFY_ARCHIVE https://github.com/tdewolff/minify/releases/download/$MINIFY_VERSION/$MINIFY_ARCHIVE
          echo "7aedeff2129f0f80819e1dde8b5d075e0f9eca3bdc9cc82f4f75dd66108d555a  /tmp/$MINIFY_ARCHIVE" | sha256sum -c -
          tar xzf /tmp/$MINIFY_ARCHIVE -C /tmp
          /tmp/minify compact-games-site-package/website/index.html -o compact-games-site-package/website/index.html
          /tmp/minify compact-games-site-package/website/faq.html -o compact-games-site-package/website/faq.html
          /tmp/minify compact-games-site-package/website/privacy.html -o compact-games-site-package/website/privacy.html
          /tmp/minify compact-games-site-package/website/tos.html -o compact-games-site-package/website/tos.html
          /tmp/minify compact-games-site-package/website/styles.css -o compact-games-site-package/website/styles.css
          /tmp/minify compact-games-site-package/website/app.js -o compact-games-site-package/website/app.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: compact-games-site-package/website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
