name: Export Compression Database

on:
  workflow_dispatch:
    inputs:
      min_samples:
        description: "Minimum samples required per algorithm"
        required: false
        default: "3"
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: compression-database-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check out CompactGUI database
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: IridiumIO/CompactGUI
          ref: database
          path: compactgui-database
          sparse-checkout: |
            database.json
          sparse-checkout-cone-mode: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Check Node supply-chain guardrails
        run: node ./scripts/check-node-supply-chain.mjs

      - name: Export compression database bundle
        env:
          COMPACT_GAMES_COMPRESSION_DB_INPUT: compactgui-database/database.json
          COMPACT_GAMES_COMPRESSION_DB_MIN_SAMPLES: ${{ inputs.min_samples || vars.COMPACT_GAMES_COMPRESSION_DB_MIN_SAMPLES || '3' }}
        run: |
          SOURCE_SHA="$(git -C compactgui-database rev-parse HEAD)"
          node ./scripts/normalize-compression-database.mjs --source="IridiumIO/CompactGUI@${SOURCE_SHA}"

      - name: Upload export artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compression-database
          path: dist/compression-db/
          retention-days: 7
          if-no-files-found: error

  attach-to-release:
    if: github.event_name == 'release'
    needs: export
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download compression database artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: compression-database
          path: dist/compression-db/

      - name: Attach compression database bundle to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            dist/compression-db/compression_db.v1.json
            dist/compression-db/compression_db.v1.bundle.json
