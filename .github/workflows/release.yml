name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
      release_notes:
        description: "Release notes (one paragraph)"
        required: false
        default: ""
  release:
    types: [created]

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.41.6"
  RUST_TOOLCHAIN: "stable"

jobs:
  build:
    name: Build Windows Release
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Extract version from release tag (e.g. v0.2.0 -> 0.2.0)
            TAG="${{ github.event.release.tag_name }}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate source version
        shell: bash
        run: |
          EXPECTED_VERSION="${{ steps.version.outputs.version }}"
          PUBSPEC_VERSION=$(python - <<'PY'
          import re
          from pathlib import Path

          text = Path("pubspec.yaml").read_text(encoding="utf-8")
          match = re.search(r"^version:\s*([0-9]+\.[0-9]+\.[0-9]+)", text, re.MULTILINE)
          if not match:
              raise SystemExit("Failed to read version from pubspec.yaml")
          print(match.group(1))
          PY
          )
          APP_CONSTANTS_VERSION=$(python - <<'PY'
          import re
          from pathlib import Path

          text = Path("lib/core/constants/app_constants.dart").read_text(encoding="utf-8")
          match = re.search(r"appVersion\s*=\s*'([^']+)'", text)
          if not match:
              raise SystemExit("Failed to read AppConstants.appVersion")
          print(match.group(1))
          PY
          )

          if [ "$EXPECTED_VERSION" != "$PUBSPEC_VERSION" ] || [ "$EXPECTED_VERSION" != "$APP_CONSTANTS_VERSION" ]; then
            echo "Release version $EXPECTED_VERSION does not match source versions (pubspec=$PUBSPEC_VERSION, app_constants=$APP_CONSTANTS_VERSION)." >&2
            exit 1
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen@2.11.1

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate FRB bindings
        run: flutter_rust_bridge_codegen generate

      - name: Build Rust release
        shell: bash
        run: cd rust && cargo build --release

      - name: Build Windows release
        run: flutter build windows --release

      - name: Copy Rust DLL to release bundle
        shell: bash
        run: cp rust/target/release/compact_games_core.dll build/windows/x64/runner/Release/

      - name: Bundle VC++ runtime DLLs
        shell: powershell
        run: |
          $vcrtDir = Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Directory -Filter "Microsoft.VC*.CRT" |
            Where-Object { $_.FullName -match 'x64' -and (Test-Path (Join-Path $_.FullName 'vcruntime140.dll')) } |
            Select-Object -First 1
          if (-not $vcrtDir) {
            $vcrtDir = Get-ChildItem "C:\Program Files (x86)\Microsoft Visual Studio" -Recurse -Directory -Filter "Microsoft.VC*.CRT" |
              Where-Object { $_.FullName -match 'x64' -and (Test-Path (Join-Path $_.FullName 'vcruntime140.dll')) } |
              Select-Object -First 1
          }
          if (-not $vcrtDir) { throw "VC++ runtime DLLs not found" }
          $dest = "build\windows\x64\runner\Release"
          Copy-Item (Join-Path $vcrtDir.FullName "vcruntime140.dll") $dest
          Copy-Item (Join-Path $vcrtDir.FullName "vcruntime140_1.dll") $dest
          Copy-Item (Join-Path $vcrtDir.FullName "msvcp140.dll") $dest
          Write-Host "Bundled VC++ runtime from $($vcrtDir.FullName)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-build
          path: build/windows/x64/runner/Release/

  package:
    name: Package Installer
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release-build
          path: build/windows/x64/runner/Release/

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=${{ needs.build.outputs.version }} installer\compact_games.iss

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum CompactGames-Setup-${{ needs.build.outputs.version }}.exe > sha256sums.txt
          cat sha256sums.txt

      - name: Generate latest.json manifest
        shell: bash
        env:
          RELEASE_NOTES: ${{ github.event.inputs.release_notes || github.event.release.body || '' }}
          REPOSITORY: ${{ github.repository }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          CHECKSUM=$(awk '{print $1}' dist/sha256sums.txt)
          PUBLISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          export VERSION CHECKSUM PUBLISHED_AT REPOSITORY

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          repository = os.environ["REPOSITORY"]
          manifest = {
              "version": version,
              "download_url": f"https://github.com/{repository}/releases/latest/download/CompactGames-Setup-{version}.exe",
              "checksum_sha256": os.environ["CHECKSUM"],
              "release_notes": os.environ.get("RELEASE_NOTES", "").strip(),
              "published_at": os.environ["PUBLISHED_AT"],
          }
          Path("dist/latest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          echo "Generated latest.json:"
          cat dist/latest.json

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-artifacts
          path: |
            dist/CompactGames-Setup-*.exe
            dist/latest.json
            dist/sha256sums.txt

  release:
    name: Attach to GitHub Release
    needs: [build, package]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: installer-artifacts
          path: dist/

      - name: Attach assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CompactGames-Setup-*.exe
            dist/latest.json
            dist/sha256sums.txt

  release-dispatch:
    name: Create Draft Release (manual trigger)
    needs: [build, package]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: installer-artifacts
          path: dist/

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          notes = os.environ.get("RELEASE_NOTES", "").strip() or f"Release v{version}"
          Path("dist/release-notes.md").write_text(notes, encoding="utf-8")
          PY

          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "Compact Games v${VERSION}" \
            --notes-file dist/release-notes.md \
            --draft \
            dist/CompactGames-Setup-${VERSION}.exe \
            dist/latest.json \
            dist/sha256sums.txt
