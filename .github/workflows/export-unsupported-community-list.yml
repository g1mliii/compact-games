name: Export Unsupported Community List

on:
  workflow_dispatch:
    inputs:
      min_reporters:
        description: "Minimum unique reporters required"
        required: false
        default: "1"
      min_repeat_reporters:
        description: "Minimum reporters with report_count >= 2"
        required: false
        default: "1"
      max_age_days:
        description: "Ignore submissions older than this many days"
        required: false
        default: "180"
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: unsupported-community-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Check Node supply-chain guardrails
        run: node ./scripts/check-node-supply-chain.mjs

      - name: Export unsupported community bundle
        env:
          COMPACT_GAMES_UNSUPPORTED_WORKER_URL: ${{ vars.COMPACT_GAMES_UNSUPPORTED_WORKER_URL || 'https://compact-games-unsupported-report-ingest.pressplay-subai.workers.dev' }}
          COMPACT_GAMES_UNSUPPORTED_MIN_REPORTERS: ${{ inputs.min_reporters || vars.COMPACT_GAMES_UNSUPPORTED_MIN_REPORTERS || '1' }}
          COMPACT_GAMES_UNSUPPORTED_MIN_REPEAT_REPORTERS: ${{ inputs.min_repeat_reporters || vars.COMPACT_GAMES_UNSUPPORTED_MIN_REPEAT_REPORTERS || '1' }}
          COMPACT_GAMES_UNSUPPORTED_MAX_AGE_DAYS: ${{ inputs.max_age_days || vars.COMPACT_GAMES_UNSUPPORTED_MAX_AGE_DAYS || '180' }}
        run: node ./scripts/export-unsupported-community-list.mjs

      - name: Upload export artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsupported-community-list
          path: dist/unsupported-community/
          retention-days: 7
          if-no-files-found: error

  attach-to-release:
    if: github.event_name == 'release'
    needs: export
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download unsupported community artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unsupported-community-list
          path: dist/unsupported-community/

      - name: Attach unsupported list bundle to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/unsupported-community/unsupported_games.json
            dist/unsupported-community/unsupported_games.bundle.json
